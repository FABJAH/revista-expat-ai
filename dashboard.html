<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revista Expats - API Metrics Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: white;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            color: #333;
            font-size: 28px;
        }

        .header-status {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #10b981;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .last-updated {
            color: #666;
            font-size: 12px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .card h2 {
            color: #333;
            font-size: 18px;
            margin-bottom: 15px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .metric-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }

        .metric-row:last-child {
            border-bottom: none;
        }

        .metric-label {
            color: #666;
            font-weight: 500;
        }

        .metric-value {
            color: #333;
            font-weight: 600;
            font-family: 'Courier New', monospace;
        }

        .endpoint-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .endpoint-table thead {
            background: #f8f9fa;
        }

        .endpoint-table th {
            padding: 12px;
            text-align: left;
            color: #666;
            font-weight: 600;
            border-bottom: 2px solid #667eea;
        }

        .endpoint-table td {
            padding: 12px;
            border-bottom: 1px solid #eee;
        }

        .endpoint-table tr:hover {
            background: #f8f9fa;
        }

        .endpoint-name {
            font-family: monospace;
            color: #333;
            font-weight: 500;
        }

        .metric-pill {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .pill-good {
            background: #d1fae5;
            color: #065f46;
        }

        .pill-warning {
            background: #fef3c7;
            color: #92400e;
        }

        .pill-danger {
            background: #fee2e2;
            color: #991b1b;
        }

        .agent-bars {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .agent-bar {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .agent-name {
            width: 120px;
            font-size: 13px;
            font-weight: 500;
            color: #333;
        }

        .bar-container {
            flex: 1;
            height: 24px;
            background: #eee;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 4px;
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 8px;
            color: white;
            font-size: 12px;
            font-weight: 600;
        }

        .alert-box {
            background: #fef3c7;
            border-left: 4px solid #f59e0b;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 10px;
        }

        .alert-box.error {
            background: #fee2e2;
            border-left-color: #ef4444;
        }

        .alert-title {
            font-weight: 600;
            color: #333;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 5px;
        }

        .alert-icon {
            font-size: 18px;
        }

        .alert-message {
            color: #666;
            font-size: 13px;
        }

        .no-alerts {
            text-align: center;
            color: #10b981;
            font-weight: 500;
            padding: 20px;
        }

        .wide-card {
            grid-column: 1 / -1;
        }

        .refresh-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .refresh-btn:hover {
            background: #5568d3;
            transform: translateY(-1px);
        }

        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading {
            text-align: center;
            color: #666;
            padding: 40px;
        }

        .error-message {
            background: #fee2e2;
            border: 1px solid #fca5a5;
            color: #991b1b;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }

            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 API Metrics Dashboard</h1>
            <div class="header-status">
                <div class="status-dot"></div>
                <div>
                    <div class="last-updated" id="lastUpdate">Actualizando...</div>
                    <button class="refresh-btn" onclick="refreshMetrics()">🔄 Refrescar ahora</button>
                </div>
            </div>
        </header>

        <div id="errorContainer"></div>

        <div class="grid">
            <!-- Resumen General -->
            <div class="card">
                <h2>📈 Resumen General</h2>
                <div class="metric-row">
                    <span class="metric-label">Total Requests:</span>
                    <span class="metric-value" id="totalRequests">-</span>
                </div>
                <div class="metric-row">
                    <span class="metric-label">Total Errores:</span>
                    <span class="metric-value" id="totalErrors">-</span>
                </div>
                <div class="metric-row">
                    <span class="metric-label">Tasa Error Global:</span>
                    <span class="metric-value" id="globalErrorRate">-</span>
                </div>
                <div class="metric-row">
                    <span class="metric-label">Latencia Promedio:</span>
                    <span class="metric-value" id="avgLatency">-</span>
                </div>
                <div class="metric-row">
                    <span class="metric-label">P95 Latencia:</span>
                    <span class="metric-value" id="p95Latency">-</span>
                </div>
            </div>

            <!-- Agentes Activos -->
            <div class="card">
                <h2>🤖 Agentes Top 5</h2>
                <div class="agent-bars" id="agentBars">
                    <div class="loading">
                        <span class="spinner"></span>Cargando...
                    </div>
                </div>
            </div>

            <!-- Estado de Alertas -->
            <div class="card">
                <h2>🚨 Alertas en Tiempo Real</h2>
                <div id="alertsContainer">
                    <div class="loading">
                        <span class="spinner"></span>Cargando...
                    </div>
                </div>
            </div>

            <!-- Endpoints Detallados -->
            <div class="card wide-card">
                <h2>🔀 Métricas por Endpoint</h2>
                <div id="endpointsContainer" style="overflow-x: auto;">
                    <div class="loading">
                        <span class="spinner"></span>Cargando...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const REFRESH_INTERVAL = 5000; // 5 segundos
        let refreshTimer;

        async function fetchMetrics() {
            try {
                const response = await fetch('/api/metrics');
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return await response.json();
            } catch (error) {
                console.error('Error fetching metrics:', error);
                showError(`Error al conectar con métricas: ${error.message}`);
                return null;
            }
        }

        function showError(message) {
            const container = document.getElementById('errorContainer');
            container.innerHTML = `<div class="error-message">⚠️ ${message}</div>`;
            setTimeout(() => { container.innerHTML = ''; }, 5000);
        }

        function formatNumber(num) {
            return num !== null ? num.toLocaleString('es-ES') : '-';
        }

        function formatLatency(ms) {
            return ms !== null ? `${ms.toFixed(1)}ms` : '-';
        }

        function formatPercent(pct) {
            return pct !== null ? `${pct.toFixed(1)}%` : '-';
        }

        function getStatusPill(value, warnThreshold, errorThreshold) {
            if (value === null) return 'pill-good';
            if (value >= errorThreshold) return 'pill-danger';
            if (value >= warnThreshold) return 'pill-warning';
            return 'pill-good';
        }

        function updateSummary(metrics) {
            let totalRequests = 0;
            let totalErrors = 0;
            let sumLatency = 0;
            let countLatency = 0;
            let p95Values = [];

            for (const [endpoint, data] of Object.entries(metrics.endpoints)) {
                totalRequests += data.request_count || 0;
                totalErrors += data.error_count || 0;
                if (data.latency_samples && data.latency_samples.length > 0) {
                    sumLatency += data.latency_samples.reduce((a, b) => a + b, 0);
                    countLatency += data.latency_samples.length;
                    p95Values.push(...data.latency_samples);
                }
            }

            const avgLatency = countLatency > 0 ? sumLatency / countLatency : null;
            let p95Latency = null;
            if (p95Values.length > 0) {
                p95Values.sort((a, b) => a - b);
                const idx = Math.ceil(p95Values.length * 0.95) - 1;
                p95Latency = p95Values[Math.max(0, idx)];
            }

            const errorRate = totalRequests > 0 ? (totalErrors / totalRequests) * 100 : 0;

            document.getElementById('totalRequests').textContent = formatNumber(totalRequests);
            document.getElementById('totalErrors').textContent = formatNumber(totalErrors);
            document.getElementById('globalErrorRate').textContent = formatPercent(errorRate);
            document.getElementById('avgLatency').textContent = formatLatency(avgLatency);
            document.getElementById('p95Latency').textContent = formatLatency(p95Latency);
        }

        function updateAgents(metrics) {
            const agents = Object.entries(metrics.query_agent_counts || {})
                .map(([name, count]) => ({ name, count }))
                .sort((a, b) => b.count - a.count)
                .slice(0, 5);

            const maxCount = agents.length > 0 ? agents[0].count : 1;

            const html = agents.length > 0
                ? agents.map(agent => `
                    <div class="agent-bar">
                        <div class="agent-name">${agent.name}</div>
                        <div class="bar-container">
                            <div class="bar-fill" style="width: ${(agent.count / maxCount) * 100}%">
                                ${agent.count}
                            </div>
                        </div>
                    </div>
                `).join('')
                : '<div style="text-align: center; color: #999; padding: 20px;">Sin datos aún</div>';

            document.getElementById('agentBars').innerHTML = html;
        }

        function updateAlerts(metrics) {
            const alerts = metrics.alerts || [];

            const html = alerts.length > 0
                ? alerts.map(alert => {
                    const isError = alert.type === 'error_rate';
                    return `
                        <div class="alert-box ${isError ? 'error' : ''}">
                            <div class="alert-title">
                                <span class="alert-icon">${isError ? '🔴' : '🟡'}</span>
                                ${alert.endpoint}
                            </div>
                            <div class="alert-message">${alert.message}</div>
                        </div>
                    `;
                }).join('')
                : '<div class="no-alerts">✅ Sin alertas - Sistema operativo</div>';

            document.getElementById('alertsContainer').innerHTML = html;
        }

        function updateEndpoints(metrics) {
            const endpoints = Object.entries(metrics.endpoints || {});

            if (endpoints.length === 0) {
                document.getElementById('endpointsContainer').innerHTML =
                    '<div style="text-align: center; padding: 20px; color: #999;">Sin datos de endpoints</div>';
                return;
            }

            const rows = endpoints.map(([endpoint, data]) => {
                const errorRate = data.request_count > 0
                    ? (data.error_count / data.request_count) * 100
                    : 0;

                const latencyAvg = data.latency_samples && data.latency_samples.length > 0
                    ? data.latency_samples.reduce((a, b) => a + b, 0) / data.latency_samples.length
                    : null;

                let latencyP95 = null;
                if (data.latency_samples && data.latency_samples.length > 0) {
                    const sorted = [...data.latency_samples].sort((a, b) => a - b);
                    const idx = Math.ceil(sorted.length * 0.95) - 1;
                    latencyP95 = sorted[Math.max(0, idx)];
                }

                const errorPill = getStatusPill(errorRate, 10, 20);
                const latencyPill = getStatusPill(latencyP95, 1000, 1500);

                return `
                    <tr>
                        <td><span class="endpoint-name">${endpoint}</span></td>
                        <td>${formatNumber(data.request_count)}</td>
                        <td>${formatNumber(data.error_count)}</td>
                        <td><span class="metric-pill ${errorPill}">${formatPercent(errorRate)}</span></td>
                        <td><span class="metric-pill ${latencyPill}">${formatLatency(latencyAvg)}</span></td>
                        <td><span class="metric-pill ${latencyPill}">${formatLatency(latencyP95)}</span></td>
                    </tr>
                `;
            }).join('');

            const html = `
                <table class="endpoint-table">
                    <thead>
                        <tr>
                            <th>Endpoint</th>
                            <th>Requests</th>
                            <th>Errores</th>
                            <th>Tasa Error</th>
                            <th>Latencia Avg</th>
                            <th>P95 Latencia</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${rows}
                    </tbody>
                </table>
            `;

            document.getElementById('endpointsContainer').innerHTML = html;
        }

        function updateTimestamp() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('es-ES');
            document.getElementById('lastUpdate').textContent = `Actualizado: ${timeStr}`;
        }

        async function refreshMetrics() {
            const metrics = await fetchMetrics();
            if (!metrics) return;

            updateSummary(metrics);
            updateAgents(metrics);
            updateAlerts(metrics);
            updateEndpoints(metrics);
            updateTimestamp();
        }

        // Inicializar
        document.addEventListener('DOMContentLoaded', () => {
            refreshMetrics();
            refreshTimer = setInterval(refreshMetrics, REFRESH_INTERVAL);
        });

        // Limpiar al descargar
        window.addEventListener('beforeunload', () => {
            if (refreshTimer) clearInterval(refreshTimer);
        });
    </script>
</body>
</html>
