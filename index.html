<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirigiendo a Revista Expats AI</title>
  <meta name="robots" content="noindex, nofollow">
  <meta http-equiv="refresh" content="2;url=https://revista-expats-ai.onrender.com/">
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --text: #e5e7eb;
      --accent: #22c55e;
      --muted: #9ca3af;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #1f2937, var(--bg));
      color: var(--text);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 560px;
      background: linear-gradient(145deg, #111827, #0b1220);
      border: 1px solid #1f2937;
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 20px 45px rgba(0, 0, 0, 0.35);
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(1.2rem, 2vw, 1.8rem);
    }

    p {
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.5;
    }

    a {
      color: var(--accent);
      font-weight: 600;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      margin-right: 8px;
      animation: pulse 1.2s infinite;
    }

    @keyframes pulse {
      0% { opacity: 0.25; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1); }
      100% { opacity: 0.25; transform: scale(0.8); }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1><span class="dot"></span>Revista Expats AI</h1>
    <p>GitHub Pages redirige automaticamente al sitio en produccion.</p>
    <p>Si no redirige en unos segundos, abre:</p>
    <p><a href="https://revista-expats-ai.onrender.com/">https://revista-expats-ai.onrender.com/</a></p>
  </main>

  <script>
    window.location.replace("https://revista-expats-ai.onrender.com/");
  </script>
</body>
</html>
