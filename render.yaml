services:
  - type: web
    name: revista-expats-ai
    runtime: python3
    buildCommand: pip install -r requirements-prod.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PRODUCTION
        value: true
      - key: GUNICORN_CMD_ARGS
        value: --bind 0.0.0.0:$PORT -k uvicorn.workers.UvicornWorker --workers 1 --timeout 120
